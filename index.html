<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CauArquives</title>

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#ffffff',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #ffffff;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* Adicionando lenis para smooth scrolling (muito comum em sites awwwards) */
        html.lenis {
            height: auto;
        }

        .lenis.lenis-smooth {
            scroll-behavior: auto;
        }

        .lenis.lenis-smooth [data-lenis-prevent] {
            overscroll-behavior: contain;
        }

        .lenis.lenis-stopped {
            overflow: hidden;
        }
    </style>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Preloader -->
    <div id="global-loader"
        class="fixed inset-0 z-[9999] bg-white flex items-center justify-center transition-opacity duration-700 pointer-events-none">
        <span class="text-black font-black text-2xl tracking-widest animate-pulse">LOADING</span>
    </div>

    <!-- Main Container -->
    <main class="w-full max-w-full bg-[#ffffff] relative">
        <div class="scroll-track">
            <div class="scene">
                <!-- Capas injetadas aqui uma em cima da outra -->
                <div id="app" class="gallery-wrapper w-full h-full relative"></div>
            </div>
        </div>
    </main>

    <!-- Modal Imersivo -->
    <div id="album-modal"
        class="fixed inset-0 z-[100] bg-white/60 backdrop-blur-xl flex items-center justify-center opacity-0 pointer-events-none">
        <!-- Fundo dinâmico -->
        <div id="modal-bg" class="absolute inset-0 w-full h-full"></div>

        <!-- Setas de Navegação -->
        <button id="prev-album"
            class="absolute top-1/2 -translate-y-1/2 left-2 md:left-6 p-4 rounded-full hidden md:flex items-center justify-center z-20 text-black/30 hover:text-black hover:bg-black/5 active:scale-90 transition-all">
            <svg class="w-4 h-4 text-black" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"></path>
            </svg>
        </button>
        <button id="next-album"
            class="absolute top-1/2 -translate-y-1/2 right-2 md:right-6 p-4 rounded-full hidden md:flex items-center justify-center z-20 text-black/30 hover:text-black hover:bg-black/5 active:scale-90 transition-all">
            <svg class="w-4 h-4 text-black" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"></path>
            </svg>
        </button>

        <!-- Indicadores Mobile -->
        <div id="pagination-dots" class="absolute bottom-6 left-1/2 -translate-x-1/2 flex gap-2 z-20"></div>

        <!-- Conteúdo do Modal -->
        <div
            class="relative z-10 flex flex-col md:flex-row items-center justify-center gap-8 md:gap-16 p-8 max-w-6xl w-full">
            <button id="close-modal"
                class="absolute top-0 right-0 md:-top-8 md:-right-8 z-50 text-black/50 hover:text-black transition-colors text-3xl font-light p-4">&times;</button>

            <div class="w-56 h-56 md:w-96 md:h-96 flex-shrink-0" style="perspective: 1000px;">
                <img id="modal-cover" src="" alt="" class="w-full h-full object-cover rounded-xl shadow-2xl">
            </div>

            <div class="flex flex-col text-black flex-1 w-full max-w-xl">
                <h2 id="modal-title" class="text-2xl md:text-6xl font-black tracking-tighter mb-2 leading-tight line-clamp-2"></h2>
                <h3 id="modal-artist" class="text-2xl md:text-3xl font-semibold opacity-80 mb-2"></h3>
                <p id="modal-year" class="text-lg md:text-xl opacity-60 mb-8 font-light"></p>

                <!-- Custom Audio Player -->
                <div id="custom-audio-player" class="w-full flex flex-col gap-4 mt-4">
                    <div class="flex items-center gap-4">
                        <button id="custom-play-btn"
                            class="w-12 h-12 flex-shrink-0 flex items-center justify-center rounded-full bg-black text-white hover:scale-105 transition-transform">
                            <!-- Play Icon -->
                            <svg id="icon-play" class="w-5 h-5 ml-1" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M8 5v14l11-7z" />
                            </svg>
                            <!-- Pause Icon (hidden by default) -->
                            <svg id="icon-pause" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                            </svg>
                        </button>
                        <div class="flex flex-col overflow-hidden">
                            <span class="text-xs uppercase tracking-widest opacity-50 font-bold mb-1">Favorite
                                Track</span>
                            <span id="custom-track-name" class="text-xl font-medium truncate"></span>
                        </div>
                    </div>

                    <div id="progress-bar-container"
                        class="w-full h-1 bg-black/10 rounded-full overflow-hidden cursor-pointer mt-2">
                        <div id="progress-bar-fill" class="h-full w-0 bg-black transition-all duration-100 ease-linear">
                        </div>
                    </div>

                    <!-- Spotify External Link -->
                    <a id="spotify-link" href="#" target="_blank" rel="noopener noreferrer" class="text-sm text-black/40 hover:text-black transition-colors flex items-center gap-2 mt-4 w-fit">
                        <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.394-.751.522-1.146.282-3.139-1.916-7.09-2.348-11.737-1.285-.458.104-.91-.182-1.014-.64-.104-.458.182-.91.64-1.014 5.093-1.164 9.467-.68 12.975 1.464.394.24.522.751.282 1.146zm1.449-3.235c-.303.491-.941.652-1.432.349-3.589-2.203-9.083-2.833-13.064-1.554-.564.181-1.164-.131-1.345-.694-.181-.564.131-1.164.694-1.345 4.582-1.472 10.669-.769 14.8 1.765.491.303.652.941.347 1.479zm.126-3.411C15.021 8.28 8.71 8.064 5.074 9.171c-.675.205-1.396-.176-1.601-.851-.205-.675.176-1.396.851-1.601 4.254-1.294 11.238-1.042 15.938 1.751.606.36.804 1.142.443 1.748-.36.606-1.142.804-1.748.443z"/>
                        </svg>
                        Ouvir no Spotify
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- GSAP Core, ScrollTrigger & Observer (CDN) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/Observer.min.js"></script>

    <!-- App Scripts -->
    <script src="data/albums.js"></script>
    <script src="js/scroll.js"></script>
    <script src="js/modal.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
